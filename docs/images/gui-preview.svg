<svg width="1320" height="800" viewBox="0 0 1320 800" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="80" y1="60" x2="1240" y2="760" gradientUnits="userSpaceOnUse">
      <stop stop-color="#0F131A"/>
      <stop offset="1" stop-color="#161A21"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="0" y2="1">
      <stop stop-color="#171D24"/>
      <stop offset="1" stop-color="#14191F"/>
    </linearGradient>
    <linearGradient id="goldPanel" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#201C11"/>
      <stop offset="1" stop-color="#1A1710"/>
    </linearGradient>
    <filter id="shadow" x="0" y="0" width="1320" height="800" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="28" flood-color="#050709" flood-opacity="0.38"/>
    </filter>
  </defs>

  <rect width="1320" height="800" rx="32" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <rect x="20" y="20" width="1280" height="760" rx="30" fill="#11151B"/>
  </g>

  <g>
    <circle cx="78" cy="78" r="38" fill="#F2F4F7"/>
    <rect x="40" y="93" width="76" height="23" fill="#E8A93B"/>
    <rect x="40" y="61" width="76" height="8" fill="#171B22"/>
    <rect x="40" y="69" width="76" height="6" fill="#F2F4F7"/>
  </g>

  <text x="124" y="74" fill="#F7F7F2" font-size="26" font-family="'PingFang SC','Microsoft YaHei',sans-serif">Linux.do Accelerator</text>
  <text x="124" y="118" fill="#97A1AC" font-size="16" font-family="'PingFang SC','Microsoft YaHei',sans-serif">linux.do 本地加速 / CLI + Desktop</text>

  <rect x="470" y="42" width="90" height="40" rx="20" fill="#3C4650" stroke="#66727E"/>
  <text x="493" y="68" fill="#EAF0F4" font-size="16" font-family="'PingFang SC','Microsoft YaHei',sans-serif">待启动</text>

