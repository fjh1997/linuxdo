  <text x="42" y="228" fill="#F2B84E" font-size="18" font-weight="700" font-family="'PingFang SC','Microsoft YaHei',sans-serif">操作</text>
  <text x="42" y="280" fill="#F2F4F6" font-size="32" font-weight="700" font-family="'PingFang SC','Microsoft YaHei',sans-serif">加速已停止</text>

  <rect x="42" y="320" width="576" height="76" rx="6" fill="#E7E7E7"/>
  <text x="60" y="368" fill="#171A1F" font-size="22" font-weight="700" font-family="'PingFang SC','Microsoft YaHei',sans-serif">开始加速</text>

  <rect x="42" y="412" width="108" height="56" rx="6" fill="#E7E7E7"/>
  <rect x="162" y="412" width="108" height="56" rx="6" fill="#E7E7E7"/>
  <rect x="282" y="412" width="108" height="56" rx="6" fill="#E7E7E7"/>
  <text x="74" y="447" fill="#171A1F" font-size="18" font-weight="700" font-family="'PingFang SC','Microsoft YaHei',sans-serif">最小化</text>
  <text x="197" y="447" fill="#171A1F" font-size="18" font-weight="700" font-family="'PingFang SC','Microsoft YaHei',sans-serif">设置</text>
  <text x="320" y="447" fill="#171A1F" font-size="18" font-weight="700" font-family="'PingFang SC','Microsoft YaHei',sans-serif">关于</text>

  <rect x="660" y="184" width="640" height="318" rx="28" fill="url(#goldPanel)" stroke="#7A6426"/>
