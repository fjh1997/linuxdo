  <rect x="838" y="250" width="64" height="92" rx="16" fill="#262214" stroke="#6B5B2B"/>

  <text x="707" y="278" fill="#C0C7CD" font-size="15" font-family="'PingFang SC','Microsoft YaHei',sans-serif">域名</text>
  <text x="782" y="278" fill="#C0C7CD" font-size="15" font-family="'PingFang SC','Microsoft YaHei',sans-serif">DoH</text>
  <text x="853" y="278" fill="#C0C7CD" font-size="15" font-family="'PingFang SC','Microsoft YaHei',sans-serif">证书</text>

  <text x="708" y="324" fill="#F4E0B2" font-size="34" font-weight="700" font-family="'PingFang SC','Microsoft YaHei',sans-serif">35</text>
  <text x="782" y="324" fill="#F4E0B2" font-size="34" font-weight="700" font-family="'PingFang SC','Microsoft YaHei',sans-serif">3</text>
  <text x="858" y="324" fill="#F4E0B2" font-size="34" font-weight="700" font-family="'PingFang SC','Microsoft YaHei',sans-serif">4</text>

  <text x="690" y="388" fill="#BFC5CC" font-size="16" font-weight="700" font-family="'PingFang SC','Microsoft YaHei',sans-serif">上游</text>
  <text x="786" y="388" fill="#F1F4F6" font-size="16" font-family="'SFMono-Regular','Consolas',monospace">https://linux.do</text>
  <text x="690" y="432" fill="#BFC5CC" font-size="16" font-weight="700" font-family="'PingFang SC','Microsoft YaHei',sans-serif">DoH</text>
  <text x="786" y="432" fill="#F1F4F6" font-size="16" font-family="'SFMono-Regular','Consolas',monospace">https://aaa.ddd.oaifree.com/query-dns</text>

  <rect x="20" y="518" width="620" height="250" rx="28" fill="#151A22" stroke="#33404D"/>
  <text x="42" y="560" fill="#C4CBD2" font-size="18" font-weight="700" font-family="'PingFang SC','Microsoft YaHei',sans-serif">错误详情</text>
  <text x="42" y="612" fill="#EDF1F5" font-size="20" font-weight="700" font-family="'PingFang SC','Microsoft YaHei',sans-serif">当前没有错误。启动失败时会直接显示真实原因。</text>

  <rect x="660" y="518" width="640" height="250" rx="28" fill="#151D24" stroke="#31414F"/>
  <text x="690" y="560" fill="#80CFAF" font-size="18" font-weight="700" font-family="'PingFang SC','Microsoft YaHei',sans-serif">提示</text>
  <text x="690" y="620" fill="#F0F4F6" font-size="19" font-family="'PingFang SC','Microsoft YaHei',sans-serif">DoH、接管域名和证书 SAN 都放在同一个</text>
  <text x="690" y="650" fill="#F0F4F6" font-size="19" font-family="'PingFang SC','Microsoft YaHei',sans-serif">linuxdo-accelerator.toml 里，安装后直接改这一份就行。</text>
  <text x="690" y="704" fill="#A8B2BC" font-size="17" font-family="'PingFang SC','Microsoft YaHei',sans-serif">重签根证书后，浏览器最好完全退出再打开一次。</text>
